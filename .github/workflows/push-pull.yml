# This runs jobs which pyiron modules should run on pushes or PRs to main

name: Push-main-Pull-all

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pyiron:
    uses: pyiron/actions/.github/workflows/push-pull.yml@actions-4.2.1
    secrets: inherit
    with:
      tests-env-files: .ci_support/environment.yml .ci_support/environment-optional.yml
      docs-env-files: .ci_support/environment.yml .ci_support/environment-notebook.yml .ci_support/environment-optional.yml
      notebooks-env-files: .ci_support/environment.yml .ci_support/environment-notebook.yml .ci_support/environment-optional.yml
      extra-python-paths: tests tests/benchmark tests/integration tests/unit tests/legacy tests/legacy/integration tests/legacy/static tests/legacy/unit  # For executorlib
      python-version-alt1: 'exclude'
      python-version-alt2: '3.11'
      python-version: '3.12'
      python-version-alt3: '3.13'
      alternate-tests-env-files: .ci_support/lower_bound.yml
      alternate-tests-python-version: '3.11'
      alternate-tests-dir: tests/unit
      do-codecov: true
      do-codacy: false
      do-coveralls: false
      do-mypy: true

  slurm-interruption:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/slurm-test.yml
    with:
      mode: interrupt

  slurm-discovery:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/slurm-test.yml
    with:
      mode: discover

  slurm-interruption-wfms:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/slurm-test-legacy.yml
    with:
      mode: interrupt

  slurm-discovery-wfms:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/slurm-test-legacy.yml
    with:
      mode: discover

  tests-without-optionals:
    uses: pyiron/actions/.github/workflows/tests-and-coverage.yml@actions-4.2.1
    secrets: inherit
    with:
      tests-env-files: .ci_support/environment.yml
      test-dir: tests/unit
      extra-python-paths: tests tests/static tests/unit tests/legacy tests/legacy/static tests/legacy/unit
      do-coveralls: false
      do-codecov: false
