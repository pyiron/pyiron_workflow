name: Slurm Test WfMS
on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string

jobs:
  slurm_test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - "8888:3306"
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v7
      - uses: koesterlab/setup-slurm-action@v1
        timeout-minutes: 5
      - uses: pyiron/actions/cached-miniforge@actions-4.2.1
        with:
          python-version: '3.12'
          env-files: .ci_support/environment.yml .ci_support/environment-cluster.yml
      - name: Test (${{ inputs.mode }})
        shell: bash -l {0}
        timeout-minutes: 8
        run: |
          python -u tests/cluster/slurm_test.py --submit
          python -u tests/cluster/slurm_test.py --${{ inputs.mode }}